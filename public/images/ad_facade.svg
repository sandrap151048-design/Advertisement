<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0f1e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0F172A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="g3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6" />
      <stop offset="100%" style="stop-color:#6366F1" />
    </linearGradient>
    <filter id="glow3">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="800" height="500" fill="url(#bg3)"/>
  <!-- Building facade -->
  <rect x="150" y="60" width="200" height="380" rx="4" fill="#131d35" stroke="#3B82F6" stroke-width="1" stroke-opacity="0.3"/>
  <rect x="360" y="120" width="160" height="320" rx="4" fill="#131d35" stroke="#3B82F6" stroke-width="1" stroke-opacity="0.3"/>
  <rect x="530" y="80" width="130" height="360" rx="4" fill="#131d35" stroke="#3B82F6" stroke-width="1" stroke-opacity="0.3"/>
  <!-- Windows grid on left building -->
  <g fill="#1e3a5f" stroke="#3B82F6" stroke-width="0.5" stroke-opacity="0.4">
    <rect x="165" y="80" width="30" height="20" rx="2"/>
    <rect x="205" y="80" width="30" height="20" rx="2"/>
    <rect x="245" y="80" width="30" height="20" rx="2"/>
    <rect x="285" y="80" width="30" height="20" rx="2"/>
    <rect x="165" y="115" width="30" height="20" rx="2"/>
    <rect x="205" y="115" width="30" height="20" rx="2"/>
    <rect x="245" y="115" width="30" height="20" rx="2"/>
    <rect x="285" y="115" width="30" height="20" rx="2"/>
    <rect x="165" y="150" width="30" height="20" rx="2"/>
    <rect x="205" y="150" width="30" height="20" rx="2"/>
    <rect x="245" y="150" width="30" height="20" fill="#3B82F6" fill-opacity="0.4" rx="2"/>
    <rect x="285" y="150" width="30" height="20" rx="2"/>
    <rect x="165" y="185" width="30" height="20" rx="2"/>
    <rect x="205" y="185" width="30" height="20" rx="2"/>
    <rect x="245" y="185" width="30" height="20" rx="2"/>
    <rect x="285" y="185" width="30" height="20" rx="2"/>
  </g>
  <!-- Illuminated signage on building -->
  <rect x="160" y="250" width="180" height="60" rx="4" fill="url(#g3)" fill-opacity="0.15" stroke="url(#g3)" stroke-width="1.5" filter="url(#glow3)"/>
  <text x="250" y="278" font-family="Arial, sans-serif" font-size="16" font-weight="900" text-anchor="middle" fill="#3B82F6" filter="url(#glow3)">ONE CLICK</text>
  <text x="250" y="298" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#CBD5E8" letter-spacing="2">ADVERTISEMENT</text>
  <!-- Facade cladding panels on right building -->
  <g fill="none" stroke="#3B82F6" stroke-width="0.8" stroke-opacity="0.3">
    <line x1="530" y1="120" x2="660" y2="120"/>
    <line x1="530" y1="160" x2="660" y2="160"/>
    <line x1="530" y1="200" x2="660" y2="200"/>
    <line x1="530" y1="240" x2="660" y2="240"/>
    <line x1="530" y1="280" x2="660" y2="280"/>
    <line x1="530" y1="320" x2="660" y2="320"/>
    <line x1="530" y1="360" x2="660" y2="360"/>
    <line x1="530" y1="400" x2="660" y2="400"/>
    <line x1="580" y1="80" x2="580" y2="440"/>
    <line x1="620" y1="80" x2="620" y2="440"/>
  </g>
  <!-- Title -->
  <text x="400" y="42" font-family="Arial, sans-serif" font-size="16" font-weight="700" text-anchor="middle" fill="#6366F1">FACADE CLADDING &amp; SIGNAGE</text>
  <!-- Ground -->
  <rect x="100" y="440" width="600" height="4" rx="2" fill="url(#g3)" fill-opacity="0.4"/>
  <!-- Stars -->
  <text x="100" y="100" font-size="16" fill="#F59E0B" fill-opacity="0.6">✦</text>
  <text x="720" y="150" font-size="12" fill="#3B82F6" fill-opacity="0.7">✦</text>
</svg>
