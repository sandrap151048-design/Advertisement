<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e3a5f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#6366F1;stop-opacity:0.8" />
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <!-- Background grid -->
  <g stroke="#3B82F6" stroke-opacity="0.08" stroke-width="1">
    <line x1="0" y1="50" x2="800" y2="50"/>
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="150" x2="800" y2="150"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="250" x2="800" y2="250"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="350" x2="800" y2="350"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="0" y1="450" x2="800" y2="450"/>
    <line x1="100" y1="0" x2="100" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="500"/>
    <line x1="300" y1="0" x2="300" y2="500"/>
    <line x1="400" y1="0" x2="400" y2="500"/>
    <line x1="500" y1="0" x2="500" y2="500"/>
    <line x1="600" y1="0" x2="600" y2="500"/>
    <line x1="700" y1="0" x2="700" y2="500"/>
  </g>
  <!-- Glow orbs -->
  <circle cx="150" cy="150" r="120" fill="#3B82F6" fill-opacity="0.12" filter="url(#blur)"/>
  <circle cx="650" cy="350" r="150" fill="#6366F1" fill-opacity="0.12" filter="url(#blur)"/>
  <!-- Billboard frame -->
  <rect x="180" y="80" width="440" height="260" rx="8" fill="none" stroke="url(#glow)" stroke-width="2"/>
  <rect x="188" y="88" width="424" height="244" rx="6" fill="#0F172A" fill-opacity="0.7"/>
  <!-- Billboard content -->
  <text x="400" y="170" font-family="Arial, sans-serif" font-size="42" font-weight="900" text-anchor="middle" fill="url(#glow)">ONE CLICK</text>
  <text x="400" y="210" font-family="Arial, sans-serif" font-size="22" font-weight="400" text-anchor="middle" fill="#CBD5F5">ADVERTISEMENT</text>
  <line x1="280" y1="228" x2="520" y2="228" stroke="#3B82F6" stroke-width="1" stroke-opacity="0.5"/>
  <text x="400" y="260" font-family="Arial, sans-serif" font-size="13" text-anchor="middle" fill="#6366F1">PREMIUM BRANDING · SIGNAGE · DIGITAL PRINTING</text>
  <text x="400" y="295" font-family="Arial, sans-serif" font-size="13" text-anchor="middle" fill="#CBD5E8">Transforming Spaces into Brand Experiences</text>
  <!-- Stand -->
  <rect x="395" y="340" width="10" height="60" fill="#3B82F6" fill-opacity="0.5"/>
  <rect x="340" y="398" width="120" height="6" rx="3" fill="#3B82F6" fill-opacity="0.3"/>
  <!-- Decorative dots -->
  <circle cx="200" cy="420" r="3" fill="#3B82F6" fill-opacity="0.6"/>
  <circle cx="220" cy="420" r="3" fill="#6366F1" fill-opacity="0.6"/>
  <circle cx="240" cy="420" r="3" fill="#3B82F6" fill-opacity="0.3"/>
  <circle cx="600" cy="60" r="3" fill="#F59E0B" fill-opacity="0.6"/>
  <circle cx="620" cy="60" r="3" fill="#3B82F6" fill-opacity="0.4"/>
  <circle cx="640" cy="60" r="5" fill="#6366F1" fill-opacity="0.5"/>
</svg>
