<svg width="1200" height="800" viewBox="0 0 1200 800" fill="none" xmlns="http://www.w3.org/2000/svg">
<rect width="1200" height="800" fill="#1A1A1A"/>
<!-- Road -->
<rect x="0" y="600" width="1200" height="200" fill="#333333"/>
<rect x="0" y="680" width="1200" height="20" fill="#FFFF00"/>
<!-- Truck Body -->
<rect x="100" y="200" width="1000" height="400" rx="20" fill="#FFFFFF"/>
<!-- Truck Cab -->
<rect x="100" y="250" width="250" height="350" rx="15" fill="#E61E25"/>
<!-- Truck Trailer -->
<rect x="370" y="200" width="730" height="400" rx="15" fill="#FFFFFF"/>
<!-- Company Branding Area -->
<rect x="450" y="300" width="570" height="200" rx="10" fill="#E61E25"/>
<text x="735" y="420" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#FFFFFF" text-anchor="middle">YOUR BRAND</text>
<!-- Windows -->
<rect x="120" y="270" width="80" height="60" rx="5" fill="#87CEEB"/>
<rect x="220" y="270" width="60" height="60" rx="5" fill="#87CEEB"/>
<!-- Wheels -->
<circle cx="200" cy="620" r="50" fill="#333333"/>
<circle cx="300" cy="620" r="50" fill="#333333"/>
<circle cx="500" cy="620" r="50" fill="#333333"/>
<circle cx="950" cy="620" r="50" fill="#333333"/>
<!-- Wheel Rims -->
<circle cx="200" cy="620" r="30" fill="#CCCCCC"/>
<circle cx="300" cy="620" r="30" fill="#CCCCCC"/>
<circle cx="500" cy="620" r="30" fill="#CCCCCC"/>
<circle cx="950" cy="620" r="30" fill="#CCCCCC"/>
<!-- Headlights -->
<ellipse cx="120" cy="580" rx="25" dy="15" fill="#FFFF80"/>
<!-- Grille -->
<rect x="100" y="520" width="250" height="30" rx="5" fill="#333333"/>
<!-- Contact Info -->
<text x="735" y="480" font-family="Arial, sans-serif" font-size="24" fill="#FFFFFF" text-anchor="middle">050-123-4567</text>
<!-- Background Text -->
<text x="600" y="150" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#FFFFFF" text-anchor="middle">COMMERCIAL TRUCK BRANDING</text>
<text x="600" y="750" font-family="Arial, sans-serif" font-size="20" fill="#CCCCCC" text-anchor="middle">High-Impact Fleet Vehicle Wrapping Solutions</text>
</svg>